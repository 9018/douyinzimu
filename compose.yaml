# 默认使用生产配置（适合直接部署）
# 开发模式请使用: docker compose -f compose.dev.yaml up -d --build
services:
  douyin:
    container_name: douyinzimu-crawler
    build:
      context: .
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "8001:8000"
      - "16801:6800"
    environment:
      DOUYIN_HOST: 0.0.0.0
      DOUYIN_PORT: "8000"
      DOUYIN_ARIA2_HOST: 127.0.0.1
      DOUYIN_ARIA2_PORT: "6800"
      DOUYIN_ARIA2_PUBLIC_HOST: ""
      DOUYIN_ARIA2_PUBLIC_PORT: "16801"
      DOUYIN_ARIA2_SECRET: douyin_crawler_default_secret
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config
      - ./download:/app/download
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -lc '
      mkdir -p /app/download;
      ARIA2_SECRET="$${DOUYIN_ARIA2_SECRET:-douyin_crawler_default_secret}";
      echo "[docker] starting aria2 rpc on 0.0.0.0:6800, public port $${DOUYIN_ARIA2_PUBLIC_PORT:-16801}";
      aria2c --enable-rpc --rpc-listen-all --rpc-allow-origin-all \
             --rpc-secret="$${ARIA2_SECRET}" --rpc-listen-port=6800 \
             --dir=/app/download -D;
      sleep 1;
      pgrep -af aria2c || (echo "[docker] aria2 failed to start" && exit 1);
      cd /app && exec python -m backend.server --host 0.0.0.0 --port 8000
      '
    restart: unless-stopped

  whisper:
    image: ghcr.io/fluxcapacitor2/whisper-asr-webapp:main
    container_name: whisper-asr-webui
    ports:
      - "9001:8000"
    environment:
      DEFAULT_MODEL: medium
      DEFAULT_LANGUAGE: zh
      HOST_ROOT: /hostdocker
    volumes:
      - ./download:/data/uploads
      - whisper-models:/root/.cache/whisper
      - ./whisper-asr/transcripts:/data/transcripts
      - ./whisper-asr/wavs:/data/wavs
      - ./whisper-asr/app/server.py:/server.py:ro
      - ./whisper-asr/app/static:/static:ro
    command: >
      bash -lc '
      poetry run pip install --no-cache-dir "opencc-python-reimplemented>=0.1.7" &&
      exec poetry run uvicorn --host 0.0.0.0 server:app
      '
    depends_on:
      - douyin
    restart: unless-stopped

volumes:
  whisper-models:
