services:
  douyin:
    container_name: douyin-crawler
    build:
      context: .
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"
    environment:
      DOUYIN_HOST: 0.0.0.0
      DOUYIN_PORT: 8000
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env
    volumes:
      # 生产环境仅映射数据目录
      - ./config:/app/config
      - ./download:/app/download
    restart: unless-stopped
