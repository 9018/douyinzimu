services:
  douyin:
    container_name: ${DOUYIN_DEV_CONTAINER_NAME:-douyinzimu-crawler-dev}
    build:
      context: .
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "${DOUYIN_DEV_HOST_PORT:-8002}:8000"
      - "${DOUYIN_DEV_ARIA2_HOST_PORT:-6802}:6800"
    environment:
      DOUYIN_HOST: 0.0.0.0
      DOUYIN_PORT: 8000
      DOUYIN_ARIA2_SECRET: douyin_crawler_default_secret
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
    env_file:
      - .env
    volumes:
      # 前后端源码映射（开发模式）
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      # 配置与下载目录映射
      - ./config:/app/config
      - ./download:/app/download
    command: >
      bash -lc '
      mkdir -p /app/download;
      ARIA2_SECRET="$${DOUYIN_ARIA2_SECRET:-douyin_crawler_default_secret}";
      aria2c --enable-rpc --rpc-listen-all --rpc-allow-origin-all \
             --rpc-secret="$${ARIA2_SECRET}" --rpc-listen-port=6800 \
             --dir=/app/download -D;
      if [ ! -f /app/frontend/dist/index.html ]; then
        echo "[docker-dev] frontend/dist 不存在，开始构建前端...";
        cd /app/frontend && pnpm install --frozen-lockfile && pnpm build;
      fi;
      cd /app && python -m backend.server --host 0.0.0.0 --port 8000
      '
    restart: unless-stopped

volumes:
  frontend_node_modules:
